###############################################################################
# Huawei EMMA Backup-Reserve Control (Forecast.Solar + Live PV) - FINAL
# - timezone-safe: as_timestamp(..., default=...), ISO output via timestamp_local
# - day-rollover safe: trigger-based templates (re-render every 5 minutes)
# - robust PV forecast-now: nearest past or next future point
# - cover-time search (today); fallback to today-peak OR tomorrow-morning
# - integrates energy deficit (max(load - pv_corr, 0)) until chosen target time
# - reserve target: 10% steps, max 80%, fail-safe; optional SOC cap
# - hysteresis + minimal write delta; writes inverter setpoint only when needed
#
# Adjust ONLY the variables block for your environment (entity_ids + constants).
###############################################################################

############################################
# 1) Forecast.Solar RAW via REST -> attribute "watts"
############################################
rest:
  - resource: !secret rest_forecast_estimate_url # "https://api.forecast.solar/estimate/:lat/:lon/:dec/:az/:kwp" => See https://doc.forecast.solar/doku.php?id=api:estimate
    method: GET
    scan_interval: 1800
    sensor:
      - name: "ForecastSolar Raw 2"
        unique_id: forecastsolar_raw_2
        value_template: "ok"
        json_attributes_path: "$.result"
        json_attributes:
          - watts


############################################
# 2) 30min average load (Statistics)
############################################
sensor:
  - platform: statistics
    name: "EMMA Last 30min Durchschnitt"
    unique_id: emma_last_30min_durchschnitt
    entity_id: sensor.emma_ladestrom
    state_characteristic: mean
    max_age:
      minutes: 30

  # Optional smoothing of correction factor (will be used if available)
  - platform: statistics
    name: "PV Forecast Korrekturfaktor 30min Durchschnitt"
    unique_id: pv_forecast_korrekturfaktor_30m_avg
    entity_id: sensor.pv_forecast_korrekturfaktor_raw
    state_characteristic: mean
    max_age:
      minutes: 30


############################################
# 3) Trigger-based template sensors (re-render every 5 minutes)
############################################
template:
  - triggers:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/5"
      # Optional: react faster when forecast updates
      - trigger: state
        entity_id: sensor.forecastsolar_raw_2

    # --- CONFIG / MAPPING (EDIT HERE) ---
    variables:
      # Entity mapping (adjust if your names differ):
      ent_forecast_raw: "sensor.forecastsolar_raw_2"
      ent_pv_live_w: "sensor.emma_pv_ausgangsleistung"
      ent_load_inst_w: "sensor.emma_ladestrom"
      ent_load_avg30_w: "sensor.emma_last_30min_durchschnitt"
      ent_soc_pct: "sensor.emma_batterieladung"
      ent_batt_cap_kwh: "sensor.emma_bewertete_ess_kapazitat"
      ent_reserve_setpoint_pct: "number.wechselrichter_backup_power_ladestand"
      ent_grid_power_w: "sensor.emma_leistung_2"  # Netz-Wirkleistung (+Import / -Export)

      # PV-only uplift (Akkunachladung nur bei PV-Überschuss, niemals aus dem Netz):
      cfg_grid_import_margin_w: 100   # W  (Import-Toleranz gegen Rauschen)
      cfg_pv_surplus_margin_w: 500    # W  (PV muss Last um diesen Wert übertreffen)

      # Calculation constants:
      cfg_floor_load_w: 1000          # blackout minimum load assumption
      cfg_eff_discharge: 0.90         # battery->load efficiency
      cfg_step_pct: 10                # reserve step size
      cfg_reserve_max_pct: 80         # cap reserve for longevity
      cfg_corr_min: 0.70              # clamp correction factor min
      cfg_corr_max: 1.60              # clamp correction factor max
      cfg_corr_min_w: 100             # only compute corr factor above this PV level
      cfg_tomorrow_hour: 7            # fallback "tomorrow morning" hour (local)
      cfg_fallback_order: "peak_then_tomorrow"  # or "tomorrow_then_peak"
      cfg_fail_safe_hours: 6          # if forecast missing/invalid, target time = now + hours
      cfg_soc_cap_enabled: 1          # 1=never set reserve above current SOC (prevents grid charge), 0=off
      cfg_hysteresis_pct: 5           # keep current setpoint if change smaller than this
      cfg_min_write_delta_pct: 1      # automation writes only if >= this

    sensor:
      ############################################################
      # PV & Load (Debug/Inputs)
      ############################################################
      - name: "PV Live"
        unique_id: emma_backup_pv_live
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ states(ent_pv_live_w) | float(0) | round(0) }}

      - name: "Last für Berechnung (Ø, 30min)"
        unique_id: emma_backup_load_calc
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set avg_state = states(ent_load_avg30_w) %}
          {% set avg = avg_state | float(0) %}
          {% set inst = states(ent_load_inst_w) | float(0) %}
          {% if avg_state not in ['unknown','unavailable','none',''] %}
            {{ [avg, 0] | max | round(0) }}
          {% else %}
            {{ [inst, 0] | max | round(0) }}
          {% endif %}

      - name: "Last effektiv für Reserve (Floor 1000W)"
        unique_id: emma_backup_effective_load
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        # Optional (für Statistiken/Graphen):
        # state_class: measurement
        state: >
          {% set avg_state = states(ent_load_avg30_w) %}
          {% set avg = avg_state | float(0) %}
          {% set inst = states(ent_load_inst_w) | float(0) %}

          {% if avg_state not in ['unknown','unavailable','none',''] %}
            {% set l = [avg, 0] | max %}
          {% else %}
            {% set l = [inst, 0] | max %}
          {% endif %}

          {{ ([l, cfg_floor_load_w | float(1000)] | max) | round(0) }}

      ############################################################
      # PV Forecast "jetzt" (robust: nearest past OR next future)
      ############################################################
      - name: "PV Forecast jetzt"
        unique_id: emma_backup_pv_forecast_now
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set watts = state_attr(ent_forecast_raw, 'watts') %}
          {% set now_ts = as_timestamp(now()) %}
          {% if watts is mapping and watts | count > 0 %}
            {% set ns = namespace(prev_ts=None, prev_p=None, next_ts=None, next_p=None) %}
            {% for t,p in (watts | dictsort) %}
              {% set ts = as_timestamp(t, default=none) %}
              {% if ts is not none %}
                {% if ts <= now_ts %}
                  {% set ns.prev_ts = ts %}
                  {% set ns.prev_p = p | float(0) %}
                {% elif ns.next_ts is none %}
                  {% set ns.next_ts = ts %}
                  {% set ns.next_p = p | float(0) %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if ns.prev_ts is not none and ns.next_ts is not none %}
              {% set d_prev = now_ts - ns.prev_ts %}
              {% set d_next = ns.next_ts - now_ts %}
              {{ (ns.prev_p if d_prev <= d_next else ns.next_p) | round(0) }}
            {% elif ns.prev_p is not none %}
              {{ ns.prev_p | round(0) }}
            {% elif ns.next_p is not none %}
              {{ ns.next_p | round(0) }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}

      ############################################################
      # Live correction factor (raw + smoothed fallback)
      ############################################################
      - name: "PV Forecast Korrekturfaktor raw"
        unique_id: pv_forecast_korrekturfaktor_raw
        state: >
          {% set live = states(ent_pv_live_w) | float(0) %}
          {% set fc = states('sensor.pv_forecast_jetzt') | float(0) %}
          {% if live >= (cfg_corr_min_w | float(100)) and fc >= (cfg_corr_min_w | float(100)) %}
            {% set r = live / fc %}
            {% set r = [ [r, cfg_corr_min|float(0.7)] | max, cfg_corr_max|float(1.6) ] | min %}
            {{ r | round(2) }}
          {% else %}
            1.00
          {% endif %}

      - name: "PV Forecast Korrekturfaktor"
        unique_id: pv_forecast_korrekturfaktor
        state: >
          {% set sm = states('sensor.pv_forecast_korrekturfaktor_30min_durchschnitt') %}
          {% if sm not in ['unknown','unavailable','none',''] %}
            {{ sm | float(1.0) | round(2) }}
          {% else %}
            {{ states('sensor.pv_forecast_korrekturfaktor_raw') | float(1.0) | round(2) }}
          {% endif %}

      ############################################################
      # Mode + Target time:
      # - Search cover time TODAY (pv_corr >= effective_load)
      # - If not found: fallback to today's peak (future) or tomorrow morning
      # - If forecast missing: fail-safe target = now + cfg_fail_safe_hours
      ############################################################
      - name: "PV Zielmodus"
        unique_id: pv_zielmodus
        state: >
          {% set watts = state_attr(ent_forecast_raw, 'watts') %}
          {% set now_ts = as_timestamp(now()) %}
          {% set eod_ts = as_timestamp(now().replace(hour=23, minute=59, second=59, microsecond=0)) %}
          {% set load = states('sensor.last_effektiv_fur_reserve_floor_1000w') | float(cfg_floor_load_w) %}
          {% set k = states('sensor.pv_forecast_korrekturfaktor') | float(1.0) %}
          {% set ns = namespace(cover_ts=0, peak_ts=0, peak_w=0) %}
          
          {% if watts is mapping and watts | count > 0 %}
            {% for t,p in (watts | dictsort) %}
              {% set ts = as_timestamp(t, default=0) %}
              {% if ts > now_ts and ts <= eod_ts %}
                {% set pv = (p | float(0)) * k %}
                {% if pv > ns.peak_w %}
                  {% set ns.peak_w = pv %}
                  {% set ns.peak_ts = ts %}
                {% endif %}
                {% if ns.cover_ts == 0 and pv >= load %}
                  {% set ns.cover_ts = ts %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if ns.cover_ts > 0 %}
              cover_today
            {% elif ns.peak_ts > 0 %}
              peak_today
            {% else %}
              tomorrow_morning
            {% endif %}
          {% else %}
            fail_safe
          {% endif %}

      - name: "PV Zeitpunkt deckt effektive Last"
        unique_id: pv_zeitpunkt_deckt_effektive_last
        device_class: timestamp
        state: >
          {% set watts = state_attr(ent_forecast_raw, 'watts') %}
          {% set now_ts = as_timestamp(now()) %}
          {% set eod_ts = as_timestamp(now().replace(hour=23, minute=59, second=59, microsecond=0)) %}
          {% set load = states('sensor.last_effektiv_fur_reserve_floor_1000w') | float(cfg_floor_load_w) %}
          {% set k = states('sensor.pv_forecast_korrekturfaktor') | float(1.0) %}

          {# tomorrow morning #}
          {% set tm = (now() + timedelta(days=1)).replace(
              hour=cfg_tomorrow_hour|int(7), minute=0, second=0, microsecond=0
            )
          %}
          {% set tm_ts = as_timestamp(tm, default=now_ts + 3600) %}
          {% if tm_ts <= now_ts %}
            {% set tm_ts = now_ts + 3600 %}
          {% endif %}

          {# fail-safe time #}
          {% set fs_ts = now_ts + (cfg_fail_safe_hours|int(6)) * 3600 %}

          {% set ns = namespace(cover_ts=0, peak_ts=0, peak_w=-1) %}

          {% if watts is mapping and watts | count > 0 %}
            {% for t,p in (watts | dictsort) %}
              {% set ts = as_timestamp(t, default=0) %}
              {% if ts > now_ts and ts <= eod_ts %}
                {% set pv = (p | float(0)) * k %}

                {% if pv > ns.peak_w %}
                  {% set ns.peak_w = pv %}
                  {% set ns.peak_ts = ts %}
                {% endif %}

                {% if ns.cover_ts == 0 and pv >= load %}
                  {% set ns.cover_ts = ts %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% if ns.cover_ts > 0 %}
              {{ ns.cover_ts | timestamp_local(default=now().isoformat()) }}
            {% else %}
              {% if cfg_fallback_order == 'tomorrow_then_peak' %}
                {{ tm_ts | timestamp_local(default=now().isoformat()) }}
              {% else %}
                {% if ns.peak_ts > 0 %}
                  {{ ns.peak_ts | timestamp_local(default=now().isoformat()) }}
                {% else %}
                  {{ tm_ts | timestamp_local(default=now().isoformat()) }}
                {% endif %}
              {% endif %}
            {% endif %}
          {% else %}
            {{ fs_ts | timestamp_local(default=now().isoformat()) }}
          {% endif %}

      - name: "Minuten bis PV effektive Last deckt"
        unique_id: minuten_bis_pv_deckt
        unit_of_measurement: "min"
        state: >
          {% set now_ts = as_timestamp(now()) %}
          {% set t = states('sensor.pv_zeitpunkt_deckt_effektive_last') %}
          {% set t_ts = as_timestamp(t, default=now_ts) %}
          {% set mins = (t_ts - now_ts) / 60 %}
          {{ (0 if mins < 0 else mins) | round(0) | int }}

      ############################################################
      # Debug battery energy available (kWh to load)
      ############################################################
      - name: "Debug Akku Energie verfügbar"
        unique_id: debug_akku_energie_verfuegbar
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: >
          {% set cap = states(ent_batt_cap_kwh) | float(0) %}
          {% set soc = states(ent_soc_pct) | float(0) %}
          {% set eff = cfg_eff_discharge | float(0.9) %}
          {{ (cap * (soc/100) * eff) | round(2) }}

      ############################################################
      # Energy deficit integration (kWh) until target time
      ############################################################
      - name: "Debug Energiedefizit bis PV Deckung"
        unique_id: debug_energiedefizit_bis_pv_deckung
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: >
          {% set watts = state_attr(ent_forecast_raw, 'watts') %}
          {% set now_ts = as_timestamp(now()) %}
          {% set t = states('sensor.pv_zeitpunkt_deckt_effektive_last') %}
          {% set end_ts = as_timestamp(t, default=now_ts) %}
          {% set load = states('sensor.last_effektiv_fur_reserve_floor_1000w') | float(cfg_floor_load_w) %}
          {% set k = states('sensor.pv_forecast_korrekturfaktor') | float(1.0) %}

          {% if end_ts <= now_ts or load <= 0 %}
            0
          {% elif watts is mapping and watts | count > 0 %}
            {% set ns = namespace(prev_p=none, prev_t=now_ts, wh=0.0) %}

            {# initial prev_p: last <= now or first future if no past exists #}
            {% for t,p in (watts | dictsort) %}
              {% set ts = as_timestamp(t, default=none) %}
              {% if ts is not none %}
                {% if ts <= now_ts %}
                  {% set ns.prev_p = p | float(0) %}
                {% elif ns.prev_p is none %}
                  {% set ns.prev_p = p | float(0) %}
                  {% break %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if ns.prev_p is none %}{% set ns.prev_p = 0.0 %}{% endif %}

            {# integrate piecewise-constant until end_ts #}
            {% for t,p in (watts | dictsort) %}
              {% set ts = as_timestamp(t, default=none) %}
              {% if ts is not none and ts > now_ts %}
                {% set seg_end = (ts if ts < end_ts else end_ts) %}
                {% if seg_end > ns.prev_t %}
                  {% set dt_h = (seg_end - ns.prev_t) / 3600 %}
                  {% set pv_corr = (ns.prev_p * k) %}
                  {% set deficit = load - pv_corr %}
                  {% if deficit < 0 %}{% set deficit = 0 %}{% endif %}
                  {% set ns.wh = ns.wh + deficit * dt_h %}
                  {% set ns.prev_t = seg_end %}
                  {% set ns.prev_p = p | float(0) %}
                {% endif %}
              {% endif %}
              {% if ns.prev_t >= end_ts %}{% break %}{% endif %}
            {% endfor %}

            {# if end_ts beyond last forecast point, keep last pv constant #}
            {% if ns.prev_t < end_ts %}
              {% set dt_h = (end_ts - ns.prev_t) / 3600 %}
              {% set pv_corr = (ns.prev_p * k) %}
              {% set deficit = load - pv_corr %}
              {% if deficit < 0 %}{% set deficit = 0 %}{% endif %}
              {% set ns.wh = ns.wh + deficit * dt_h %}
            {% endif %}

            {{ (ns.wh / 1000) | round(3) }}
          {% else %}
            {# no forecast -> worst-case (no PV) #}
            {{ (load * ((end_ts - now_ts)/3600) / 1000) | round(3) }}
          {% endif %}

      ############################################################
      # Reserve minimum and target (10% steps, max 80, fail-safe)
      # + optional SOC cap and hysteresis
      ############################################################
      - name: "Backup Reserve Mindestwert"
        unique_id: backup_reserve_mindestwert
        unit_of_measurement: "%"
        state: >
          {% set cap = states(ent_batt_cap_kwh) | float(0) %}
          {% set need = states('sensor.debug_energiedefizit_bis_pv_deckung') | float(0) %}
          {% set eff = cfg_eff_discharge | float(0.9) %}
          {% set maxr = cfg_reserve_max_pct | float(80) %}
          {% if cap <= 0 %}
            {{ maxr | round(0) }}
          {% else %}
            {% set raw = (need / eff) / cap * 100 %}
            {% if raw < 0 %}{% set raw = 0 %}{% endif %}
            {% if raw > maxr %}{% set raw = maxr %}{% endif %}
            {{ raw | round(1) }}
          {% endif %}

      - name: "Backup Reserve Ziel"
        unique_id: backup_reserve_ziel
        unit_of_measurement: "%"
        state: >
          {% set mode = states('sensor.pv_zielmodus') %}
          {% set step = cfg_step_pct | int(10) %}
          {% set maxr = cfg_reserve_max_pct | int(80) %}
          {% set hyst = cfg_hysteresis_pct | float(5) %}
          {% set soc_cap = cfg_soc_cap_enabled | int(1) %}
          {% set soc = states(ent_soc_pct) | float(0) %}
          {% set cur = states(ent_reserve_setpoint_pct) | float(0) %}
          {% set minpct = states('sensor.backup_reserve_mindestwert') | float(maxr) %}

          {# fail-safe: if mode==fail_safe -> max reserve #}
          {% if mode == 'fail_safe' %}
            {% set tgt = maxr %}
          {% else %}
            {# step-up rounding #}
            {% set tgt = ((minpct / step) | round(0, 'ceil')) * step %}
            {% if tgt < 0 %}{% set tgt = 0 %}{% endif %}
            {% if tgt > maxr %}{% set tgt = maxr %}{% endif %}
          {% endif %}

          {# SOC protection (optional): cap to largest step <= SOC #}
          {% if soc_cap == 1 %}
            {% set soc_step = ((soc / step) | round(0, 'floor')) * step %}
            {% if soc_step < 0 %}{% set soc_step = 0 %}{% endif %}
            {% set tgt = [tgt, soc_step] | min %}
          {% endif %}

          {# hysteresis vs current setpoint (avoid bouncing) #}
          {% if (tgt - cur) | abs < hyst %}
            {{ cur | round(0) }}
          {% else %}
            {{ tgt | round(0) }}
          {% endif %}

      ############################################################
      # Status + Farbe (consistent)
      ############################################################
      - name: "Backup Ampel Status"
        unique_id: backup_ampel_status
        state: >
          {% set mode = states('sensor.pv_zielmodus') %}
          {% set tgt = states('sensor.backup_reserve_ziel') | float(80) %}
          {% if mode == 'fail_safe' %}
            fail_safe_80
          {% elif tgt >= 80 %}
            hold_80
          {% elif tgt >= 40 %}
            amber_band
          {% elif tgt > 0 %}
            green_band
          {% else %}
            full_release
          {% endif %}

      - name: "Backup Ampel Farbe"
        unique_id: backup_ampel_farbe
        state: >
          {% set s = states('sensor.backup_ampel_status') %}
          {% if s in ['fail_safe_80','hold_80'] %}
            red
          {% elif s == 'amber_band' %}
            amber
          {% else %}
            green
          {% endif %}




############################################################
# Extra Debug Sensors (für spätere Optimierung / Diagramme)
############################################################
      - name: "PV Forecast korrigiert"
        unique_id: emma_backup_pv_forecast_corr
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set fc = states('sensor.pv_forecast_jetzt') | float(0) %}
          {% set k  = states('sensor.pv_forecast_korrekturfaktor') | float(1.0) %}
          {{ (fc * k) | round(0) }}
      
      - name: "PV Fehler (Live - Forecast korr.)"
        unique_id: emma_backup_pv_error_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set live = states('sensor.pv_live') | float(0) %}
          {% set corr = states('sensor.pv_forecast_korrigiert') | float(0) %}
          {{ (live - corr) | round(0) }}
      
      - name: "PV Fehler Prozent"
        unique_id: emma_backup_pv_error_pct
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set corr = states('sensor.pv_forecast_korrigiert') | float(0) %}
          {% set err  = states('sensor.pv_fehler_live_forecast_korr') | float(0) %}
          {% if corr > 50 %}
            {{ ((err / corr) * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
      
      - name: "Backup Reserve Delta (Ziel-Ist)"
        unique_id: emma_backup_reserve_delta
        unit_of_measurement: "%"
        state_class: measurement
        state: >
          {% set tgt = states('sensor.backup_reserve_ziel') | float(0) %}
          {% set cur = states('number.wechselrichter_backup_power_ladestand') | float(0) %}
          {{ (tgt - cur) | round(0) }}
      
      - name: "Defizit Verhältnis (Need/Avail)"
        unique_id: emma_backup_deficit_ratio
        state_class: measurement
        state: >
          {% set need  = states('sensor.debug_energiedefizit_bis_pv_deckung') | float(0) %}
          {% set avail = states('sensor.debug_akku_energie_verfuegbar') | float(0) %}
          {% if avail > 0 %}
            {{ (need / avail) | round(3) }}
          {% else %}
            0
          {% endif %}
      

      - name: "Debug Grid Import (W)"
        unique_id: debug_grid_import_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {# + = Import (Netzbezug), - = Export (Einspeisung) #}
          {{ states(ent_grid_power_w) | float(0) | round(0) }}

      - name: "Debug PV Überschuss (PV - Last eff.)"
        unique_id: debug_pv_surplus_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set pv = states('sensor.pv_live') | float(0) %}
          {% set load = states('sensor.last_effektiv_fur_reserve_floor_1000w') | float(0) %}
          {{ (pv - load) | round(0) }}

      - name: "Debug PV-only Uplift erlaubt"
        unique_id: debug_pv_only_uplift_erlaubt
        state: >
          {% set pv = states('sensor.pv_live') | float(0) %}
          {% set load = states('sensor.last_effektiv_fur_reserve_floor_1000w') | float(0) %}
          {% set grid_import = states(ent_grid_power_w) | float(0) %}
          {% set pv_surplus = pv - load %}
          {% set ok =
               (grid_import <= (cfg_grid_import_margin_w|float(100))) and
               (pv_surplus >= (cfg_pv_surplus_margin_w|float(500)))
          %}
          {{ 'on' if ok else 'off' }}

      
############################################
# 4) Automation: write reserve target to inverter setpoint only when needed
############################################
automation:
  - id: emma_backup_reserve_auto_set
    alias: "Huawei EMMA: Backup Reserve automatisch setzen"
    mode: single
    triggers:
      - trigger: time_pattern
        minutes: "/5"
      - trigger: state
        entity_id: sensor.backup_reserve_ziel
    conditions:
      - condition: template
        value_template: "{{ is_number(states('sensor.backup_reserve_ziel')) }}"
    actions:
      - variables:
          target: "{{ states('sensor.backup_reserve_ziel') | float(0) }}"
          current: "{{ states('number.wechselrichter_backup_power_ladestand') | float(0) }}"
          min_delta: "{{ cfg_min_write_delta_pct | float(1) }}"
      - condition: template
        value_template: >
          {{ target >= 0 and target <= 80 and ((target - current) | abs >= (min_delta | float(1))) }}
      - action: number.set_value
        target:
          entity_id: number.wechselrichter_backup_power_ladestand
        data:
          value: "{{ target }}"
